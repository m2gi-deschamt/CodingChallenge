<!DOCTYPE html>
<html>
<body>
  <input type="text" id="value" placeholder="value" />
  <input type="text" id="base1" placeholder="base1" />
  <input type="text" id="base2" placeholder="base2" />

  <button onclick="convert()">Convert</button>

  <pre id="result"></pre>

  <script>
    function convert() {
      const value = document.getElementById("value").value;
      const base1 = parseInt(document.getElementById("base1").value);
      const base2 = parseInt(document.getElementById("base2").value);

      fetch("http://localhost:5555/convert", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          value: value,
          base1: base1,
          base2: base2
        })
      })
      .then(res => res.json())
      .then(data => {
        document.getElementById("result").textContent =
          JSON.stringify(data, null, 2);
      })
      .catch(err => {
        console.error(err);
      });
    }
  </script>
</body>
</html>
