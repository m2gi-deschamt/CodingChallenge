<!DOCTYPE html>
<html>
<body>
  <input type="text" id="value" placeholder="value" />
  <input type="number" id="base1" step="1" min="2" max="20" required>
  <input type="number" id="base2" step="1" min="2" max="20" required>

  <button onclick="convert()">Convert</button>

  <pre id="result"></pre>

  <script>
    function convert() {
      const value = document.getElementById("value").value;
      const base1 = document.getElementById("base1").value;
      const base2 = document.getElementById("base2").value;

      fetch("http://localhost:5555/convert", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
            value: value,
            base1: Number(base1),
            base2: Number(base2)
        })
      })
      .then(res => res.json())
      .then(data => {
        document.getElementById("result").textContent =
          JSON.stringify(data, null, 2);
      })
      .catch(err => {
        console.error(err);
      });
    }
  </script>
</body>
</html>
